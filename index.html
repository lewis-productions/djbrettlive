  <title>Thank You | DJ Brett LIVE</title>

  <!-- DM Sans matches the clean geometric style of the logo -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #FAF4EE;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header / Logo text ── */
    header {
      padding: 28px 56px 20px;
      flex-shrink: 0;
    }

    .logo-text {
      display: flex;
      align-items: baseline;
      gap: 10px;
      line-height: 1;
    }

    .logo-dj {
      font-size: 46px;
      font-weight: 300;
      letter-spacing: -0.01em;
      color: #000;
    }

    .logo-name {
      font-size: 20px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #000;
    }

    /* ── Main: single column, left-aligned ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      min-height: 0;
    }

    .text-side {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 20px 56px 48px;
    }

    h1 {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(56px, 7vw, 100px);
      font-weight: 700;
      line-height: 1.0;
      text-transform: uppercase;
      color: #000;
      letter-spacing: -0.01em;
      margin-bottom: 24px;
    }

    .subheading {
      font-size: clamp(18px, 1.8vw, 24px);
      font-weight: 400;
      color: #111;
      line-height: 1.6;
      max-width: 480px;
    }

    /* ── Footer ── */
    footer {
      padding: 18px 56px;
      display: flex;
      align-items: center;
      gap: 18px;
      border-top: 1px solid rgba(0, 0, 0, 0.12);
      flex-shrink: 0;
    }

    .follow-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #000;
    }

    .social-links {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .social-links a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border: 1.5px solid #000;
      border-radius: 50%;
      color: #000;
      text-decoration: none;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .social-links a:hover {
      background: #000;
      color: #FAF4EE;
    }

    .social-links svg {
      width: 15px;
      height: 15px;
      fill: currentColor;
    }

    .email-link {
      margin-left: auto;
      font-size: 13px;
      font-weight: 400;
      color: #000;
      text-decoration: none;
      letter-spacing: 0.03em;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s ease;
    }

    .email-link:hover {
      border-bottom-color: #000;
    }

    /* ════════════════════════════════
       MOBILE  (≤ 768px)
    ════════════════════════════════ */
    @media (max-width: 768px) {

      header {
        padding: 20px 24px 14px;
      }

      .logo-dj  { font-size: 36px; }
      .logo-name { font-size: 16px; }

      main {
        align-items: flex-start;
      }

      .text-side {
        padding: 16px 24px 32px;
      }

      h1 {
        font-size: clamp(44px, 13vw, 70px);
        margin-bottom: 18px;
      }

      .subheading {
        font-size: 18px;
        max-width: 100%;
      }

      footer {
        padding: 14px 24px;
        flex-wrap: wrap;
        row-gap: 10px;
      }

      .email-link {
        margin-left: 0;
        font-size: 12px;
      }
    }

    /* Very small phones */
    @media (max-width: 380px) {
      h1 { font-size: 40px; }
      .logo-dj { font-size: 30px; }
      .logo-name { font-size: 14px; }
    }
  </style>
</head>
<body>

  <!-- Logo -->
  <header>
    <div class="logo-text">
      <span class="logo-dj">DJ</span>
      <span class="logo-name">Brett Live</span>

  <main>
    <div class="text-side">
      <h1>Thank You<br>For Your<br>Inquiry!</h1>
      <p class="subheading">I'll reach out soon to discuss your event details.</p>
    </div>
  </main>
